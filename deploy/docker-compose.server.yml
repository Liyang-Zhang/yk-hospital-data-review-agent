services:
  backend:
    image: yk-review-agent-backend:session6
    container_name: yk-review-agent-backend
    restart: unless-stopped
    env_file:
      - ./backend.server.env
    ports:
      - "18765:8000"
    volumes:
      - ./data/snapshot.db:/app/snapshot.db:ro
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/api/v1/health')",
        ]
      interval: 20s
      timeout: 5s
      retries: 3
      start_period: 15s

  frontend:
    image: yk-review-agent-frontend:session6
    container_name: yk-review-agent-frontend
    restart: unless-stopped
    ports:
      - "18088:80"
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1/healthz"]
      interval: 20s
      timeout: 5s
      retries: 3
      start_period: 10s
